services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: orderai
      POSTGRES_PASSWORD: orderai
      POSTGRES_DB: orderai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+psycopg2://orderai:orderai@db:5432/orderai
      JWT_SECRET: change-me-in-prod
      PORT: 8000
    ports:
      - "8000:8000"
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  pgdata:
